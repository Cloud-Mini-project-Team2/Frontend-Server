<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>대시보드 - 취업 지원 서비스</title>
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/jobPost.css">
<link rel="stylesheet" href="css/dashboard.css">
</head>
<body>

<div class="topbar">
  <div class="topbar-inner">
    <div class="logo">취업 지원 서비스</div>
    <nav class="nav-links">
      <a href="dashboard.html" class="active">대시보드</a>
      <a href="jobPost.html">채용 공고</a>
      <a href="portfolio.html">포트폴리오</a>
      <a href="userInfo.html">마이페이지</a>
    </nav>
  </div>
</div>

<div class="container">
  <h1 class="page-title">대시보드</h1>
  <p class="page-desc">지원 현황과 희망 조건, 맞춤 채용 공고를 한눈에 확인해보세요.</p>

  <div class="section-title" style="margin-top:0;">지원 현황</div>
  <div class="stat-grid">
    <div class="card stat-card">
      <div class="stat-label">전체 공고</div>
      <div class="stat-value" id="statTotal">0</div>
    </div>
    <div class="card stat-card">
      <div class="stat-label">지원완료</div>
      <div class="stat-value success" id="statApplied">0</div>
    </div>
    <div class="card stat-card">
      <div class="stat-label">대기중</div>
      <div class="stat-value sub" id="statPending">0</div>
    </div>
    <div class="card stat-card">
      <div class="stat-label">지원률</div>
      <div class="stat-value primary" id="statRate">0%</div>
      <div class="stat-bar"><div class="stat-bar-fill" id="statBarFill"></div></div>
    </div>
  </div>

  <div class="section-title">희망 조건 요약</div>
  <div class="card">
    <div class="info-row"><span class="label">희망 직무</span><span id="prefJobPart">-</span></div>
    <div class="info-row"><span class="label">희망 지역</span><span id="prefRegion">-</span></div>
    <div class="info-row"><span class="label">경력조건</span><span id="prefCareer">-</span></div>
    <div class="info-row"><span class="label">희망 급여</span><span id="prefPay">-</span></div>
    <a class="btn btn-sm" href="userInfo.html" style="margin-top:14px;">희망 조건 수정 →</a>
  </div>

  <div class="section-title">추천 채용 공고</div>
  <p class="page-desc" style="margin-top:-6px;">희망 직무/지역과 마감일을 기준으로 뽑은 공고입니다.</p>
  <div class="job-list" id="recommendedList"></div>
</div>

<script src="js/mock-data.js"></script>
<script src="js/dashboard.js"></script>

</body>
</html>
